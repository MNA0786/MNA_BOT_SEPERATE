version: '3.8'

services:
  bot:
    build: .
    container_name: entertainment-tadka-bot
    ports:
      - "8080:80"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=1080317415
      - APP_ENV=production
      - TZ=Asia/Kolkata
    volumes:
      - ./data:/var/www/html/data
      - ./backups:/var/www/html/backups
      - ./logs:/var/www/html/logs
      - ./scans:/var/www/html/scans
      - ./bot_activity.log:/var/www/html/bot_activity.log
    restart: unless-stopped
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bot-network:
    driver: bridge
