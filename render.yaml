services:
  - type: web
    name: entertainment-tadka-bot
    runtime: php
    repo: https://github.com/yourusername/entertainment-tadka-bot
    branch: main
    plan: free
    region: singapore
    buildCommand: |
      chmod +x render-build.sh
      ./render-build.sh
    startCommand: apache2-foreground
    healthCheckPath: /ping.php  # Use ping.php instead of root
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        value: 1080317415
      - key: APP_ENV
        value: production
      - key: RENDER
        value: true
